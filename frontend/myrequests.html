<!DOCTYPE html>
<html>
<head>

<title>My Requests</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#eef2f7;
margin:0;
padding:40px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:70%;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
margin-top:0;
}

.status{
font-weight:bold;
margin-top:10px;
}

.status.pending{
color:orange;
}

.status.approved{
color:green;
}

.status.rejected{
color:red;
}

</style>

</head>

<body>

<h2 id="title">My Submitted Requests</h2>

<div id="myRequests"></div>

<script src="myrequests.js"></script>

</body>

</html>
