<!DOCTYPE html>

<html>
<head>
<title>Student Service Request</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#eef2f7;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:450px;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
overflow:hidden;
}

.header{
background:#4a90e2;
color:white;
padding:25px;
text-align:center;
font-size:20px;
font-weight:bold;
}

#welcomeUser{
font-size:14px;
margin-top:6px;
opacity:0.9;
}

.content{
padding:30px;
}

label{
font-size:14px;
color:#555;
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:6px;
margin-bottom:18px;
font-size:14px;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

.submit-btn{
background:#2ecc71;
color:white;
margin-bottom:12px;
}

.submit-btn:hover{
background:#27ae60;
}

.my-btn{
background:#3498db;
color:white;
margin-bottom:12px;
}

.logout-btn{
background:#e74c3c;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
🎓 Student Service Request
<p id="welcomeUser"></p>
</div>

<div class="content">

<button class="my-btn" onclick="window.location.href='myrequests.html'">
📄 My Requests
</button>

<label>Request Type</label>

<select id="type">
<option value="">Select Request Type</option>
<option value="Event Request">Event Request</option>
<option value="Certificate Request">Certificate Request</option>
<option value="Leave Request">Leave Request</option>
<option value="Book Request">Book Request</option>
</select>

<label>Request Title</label>

<input type="text" id="title" placeholder="Enter request title">

<label>Description</label>

<textarea id="description" placeholder="Describe your request"></textarea>

<button class="submit-btn" onclick="submitRequest()">
Submit Request
</button>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
