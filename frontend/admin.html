<!DOCTYPE html>

<html>

<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#2c3e50;
padding:15px 30px;
color:white;
}

.logo{
font-size:18px;
font-weight:bold;
}

.nav-links a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:14px;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:relative;
display:inline-block;
}

.dropdown-content{
display:none;
position:absolute;
background:white;
min-width:150px;
box-shadow:0px 8px 16px rgba(0,0,0,0.2);
border-radius:6px;
}

.dropdown-content a{
color:black;
padding:10px 15px;
display:block;
text-decoration:none;
}

.dropdown-content a:hover{
background:#f1f1f1;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* MAIN */

.container{
padding:30px;
}

h2{
text-align:center;
margin-bottom:25px;
}

/* FILTER */

.filter-row{
text-align:center;
margin-bottom:15px;
}

.filter-row button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#3498db;
color:white;
}

/* CARD */

.card{
background:white;
padding:20px;
margin:15px auto;
width:80%;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATUS */

.status-approved{color:green;font-weight:bold;}
.status-rejected{color:red;font-weight:bold;}
.status-pending{color:orange;font-weight:bold;}

/* ACTION */

button.action{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
margin-right:5px;
color:white;
}

.approve{background:#2ecc71;}
.reject{background:#e74c3c;}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
🎓 Admin Panel
</div>

<div class="nav-links">

<div class="dropdown">

<a href="#">Request Type ▼</a>

<div class="dropdown-content">
<a onclick="filterType('All')">All</a>
<a onclick="filterType('Event')">Event</a>
<a onclick="filterType('Leave')">Leave</a>
<a onclick="filterType('Certificate')">Certificate</a>
<a onclick="filterType('Book')">Book</a>
</div>

</div>

<a onclick="filterStatus('Pending')">Pending</a> <a onclick="filterStatus('Approved')">Approved</a> <a onclick="filterStatus('Rejected')">Rejected</a>

<a href="login.html">Logout</a>

</div>

</div>

<div class="container">

<h2>Admin - Student Requests</h2>

<div id="requests"></div>

</div>

<script>

let allData = [];
let currentType = "All";
let currentStatus = "All";

function updateStatus(id,status){

fetch(`http://localhost:3000/requests/${id}`,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({status:status})
})
.then(()=>location.reload());

}

function filterType(type){
currentType = type;
applyFilters();
}

function filterStatus(status){
currentStatus = status;
applyFilters();
}

function applyFilters(){

let filtered = allData;

if(currentType !== "All"){
filtered = filtered.filter(r =>
(r.type || "").toLowerCase().includes(currentType.toLowerCase())
);
}

if(currentStatus !== "All"){
filtered = filtered.filter(r => r.status === currentStatus);
}

renderRequests(filtered);

}

function renderRequests(data){

let output = "";

if(data.length === 0){
output = "<p style='text-align:center'>No Requests Found</p>";
}

data.forEach(r => {

output += `

<div class="card">

<h4>Request ID: ${r._id}</h4>

<p><b>Student Name:</b> ${r.name}</p>

<p><b>Request Type:</b> ${r.type || "General"}</p>

<h4>${r.title}</h4>

<p>${r.description}</p>

<b>Status:</b>

<span class="${
r.status==="Approved"?"status-approved":
r.status==="Rejected"?"status-rejected":
"status-pending"
}">
${r.status}
</span>

<br>

<button class="action approve"
onclick="updateStatus('${r._id}','Approved')">
Approve
</button>

<button class="action reject"
onclick="updateStatus('${r._id}','Rejected')">
Reject
</button>

</div>

`;

});

document.getElementById("requests").innerHTML = output;

}

fetch("http://localhost:3000/requests")
.then(res=>res.json())
.then(data=>{
allData = data;
applyFilters();
});

</script>

</body>
</html>
